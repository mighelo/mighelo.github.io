---
layout: default
---

<main class="container">
  <article class="post">
  <a href="/" class="back">← Home</a>

    <h1>{{ page.title }}</h1>
    <p class="subtitle">{{ page.subtitle }}</p>

    {% if page.image %}
      <img src="{{ page.image }}" alt="">
    {% endif %}

    <div class="content">
      {{ content }}
    </div>

  </article>
</main>
